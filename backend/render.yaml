services:
  - type: web
    name: attendance-backend
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: ADMIN_PINS
        sync: false
      - key: PORT
        value: 5000

  - type: cron
    name: keep-alive
    runtime: node
    rootDir: .
    buildCommand: echo ok
    schedule: "*/14 * * * *"
    startCommand: node -e "fetch('https://rrrepo.onrender.com/api/config').then(()=>console.log('pinged')).catch(console.error)"
